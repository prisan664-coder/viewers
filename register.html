<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Increase YouTube views</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Design System: Consistent with Login Page */
        body {
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #0f172a 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating Glowing Shapes */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(14, 165, 233, 0.1);
            filter: blur(100px);
            z-index: 0;
        }

        /* Glassmorphism Card */
        .register-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        @media (max-width: 576px) {
            .register-card {
                padding: 25px;
                border-radius: 20px;
            }

            .brand-logo {
                font-size: 22px !important;
            }
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-label {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-text {
            background-color: #334155;
            border: 1px solid #475569;
            color: #38bdf8;
            border-radius: 10px 0 0 10px;
        }

        .form-control {
            background-color: #1e293b;
            border: 1px solid #475569;
            color: #ffffff;
            padding: 12px;
            border-radius: 0 10px 10px 0;
        }

        .form-control:focus {
            background-color: #1e293b;
            border-color: #38bdf8;
            color: #ffffff;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        /* Button Styling */
        .btn-signup {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(14, 165, 233, 0.4);
            filter: brightness(1.1);
        }

        .badge-step {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 50px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
    </style>
</head>

<body>

    <div class="orb" style="top: -10%; left: -10%;"></div>
    <div class="orb" style="bottom: -10%; right: -10%; background: rgba(234, 179, 8, 0.05);"></div>

    <div class="register-card text-center">
        <div class="mb-4">
            <div class="mb-3">
                <i class="fab fa-youtube fa-3x text-danger"></i>
            </div>
            <h1 class="brand-logo mb-1">Increase YouTube views</h1>
            <div class="d-flex justify-content-center mt-2">
                <span class="badge-step fw-bold">CREATE NEW ACCOUNT</span>
            </div>
        </div>

        <form id="regForm" onsubmit="processRegister(event)">
            <div class="mb-3 text-start">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user-tag"></i></span>
                    <input type="text" class="form-control" id="regUsername" placeholder="e.g. investor_01" required>
                </div>
                <div id="userFeedback" class="small mt-1 text-danger hidden"></div>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="regPassword" placeholder="Enter strong password"
                        required>
                </div>
            </div>

            <div class="mb-4 text-start">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-shield-alt"></i></span>
                    <input type="password" class="form-control" id="regConfirmPassword"
                        placeholder="Repeat your password" required>
                </div>
            </div>

            <div class="mb-4 text-start">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="termsCheck" required>
                    <label class="form-check-label text-muted small" for="termsCheck">
                        I agree to the <a href="#" class="text-info text-decoration-none">Terms of Service</a> and
                        Privacy Policy.
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-signup w-100 mb-4">
                SIGN UP NOW <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>

        <p class="text-muted small mb-0">
            Already a member? <a href="index.html" class="fw-bold text-decoration-none" style="color: #eab308;">Log In
                Here</a>
        </p>
    </div>

    <script>
        function processRegister(event) {
            event.preventDefault();

            const user = document.getElementById('regUsername').value.trim();
            const pass = document.getElementById('regPassword').value;
            const confirmPass = document.getElementById('regConfirmPassword').value;

            // 1. Validation: Check Password Match
            if (pass !== confirmPass) {
                alert("Registration Failed: Passwords do not match!");
                return;
            }

            // 2. Database Simulation (localStorage)
            let allUsers = JSON.parse(localStorage.getItem('web_users')) || [];

            // 3. Validation: Check Existing Username
            const isExist = allUsers.some(account => account.username.toLowerCase() === user.toLowerCase());
            if (isExist) {
                alert("This username is already taken. Please choose another one.");
                return;
            }

            // 4. Save New Member (Each has its own unique balance and data)
            const newUser = {
                username: user,
                password: pass,
                balance: 0.00,
                history: [],
                createdAt: new Date().toISOString()
            };

            allUsers.push(newUser);
            localStorage.setItem('web_users', JSON.stringify(allUsers));

            // 5. Success Animation & Redirect
            alert("Account Created Successfully!\nWelcome to Increase YouTube views. Please login to start earning.");
            window.location.href = 'index.html'; // ພາໄປໜ້າ Login
        }
    </script>
</body>

</html>
